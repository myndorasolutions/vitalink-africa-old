services:
  postgres:
    image: postgres:16-alpine
    container_name: vitalink-postgres
    environment:
      POSTGRES_USER: vitalink
      POSTGRES_PASSWORD: vitalink_dev
      POSTGRES_DB: vitalink_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalink -d vitalink_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vitalink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
