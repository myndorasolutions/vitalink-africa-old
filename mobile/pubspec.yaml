name: myndora_care
description: Myndora Care — offline-first chronic care for patients, caregivers, and CHWs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5
  fl_chart: ^0.70.2
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/myndora_logo.png
    - assets/images/myndora_care_logo5.jpeg
    - assets/audio/yoruba/
